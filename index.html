<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIZZAGATE OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react-dom": "https://esm.sh/react-dom@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/src/index.css">
</head>
<body class="bg-black text-white">
    <div id="root"></div>
    <div id="pizza-cursor"></div>
    <div class="retro-scanline"></div>

    <script>
        const cursor = document.getElementById('pizza-cursor');
        
        // Track mouse position
        window.addEventListener('mousemove', (e) => {
            cursor.style.display = 'block';
            cursor.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0)`;
            
            // Re-check hovering state on move for elements that might have appeared
            const target = e.target;
            const isClickable = target.closest('a, button, [role="button"], .cursor-pointer, input, textarea, select');
            if (isClickable) {
                document.body.classList.add('is-hovering');
            } else {
                document.body.classList.remove('is-hovering');
            }
        });

        // Hide cursor when leaving window
        window.addEventListener('mouseout', (e) => {
            if (!e.relatedTarget && !e.toElement) {
                cursor.style.opacity = '0';
            }
        });

        window.addEventListener('mouseover', () => {
            cursor.style.opacity = '1';
        });

        // Maintain cursor logic during scroll
        window.addEventListener('scroll', () => {
             document.body.classList.remove('is-hovering');
        });
    </script>
<script type="module" src="/src/index.tsx"></script>
</body>
</html>
